name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
          key: deps-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  quality:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
          key: deps-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Prepare Nuxt
        run: pnpm nuxt prepare
      - name: Lint and Typecheck
        run: pnpm quality
      - name: Unit Tests
        run: pnpm -r test:unit --if-present

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        app:
          [
            web,
            showcase,
            example-auth,
            example-blog,
            example-marketing,
            example-og-image,
            example-apple-maps,
          ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
          key: deps-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Check Doppler Token
        id: check_doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Doppler Secrets
        if: steps.check_doppler.outputs.has_token == 'true'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Build ${{ matrix.app }}
        env:
          NITRO_PRESET: cloudflare-module
        run: turbo run build --filter=${{ matrix.app }}
