<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Cat paw print -->
  <g fill="#fff" opacity="0.95">
    <!-- Main pad -->
    <ellipse cx="256" cy="300" rx="75" ry="65"/>
    <!-- Top left toe -->
    <ellipse cx="175" cy="210" rx="35" ry="40" transform="rotate(-15 175 210)"/>
    <!-- Top center-left toe -->
    <ellipse cx="230" cy="185" rx="32" ry="38" transform="rotate(-5 230 185)"/>
    <!-- Top center-right toe -->
    <ellipse cx="282" cy="185" rx="32" ry="38" transform="rotate(5 282 185)"/>
    <!-- Top right toe -->
    <ellipse cx="337" cy="210" rx="35" ry="40" transform="rotate(15 337 210)"/>
  </g>
  <!-- Claw marks -->
  <g stroke="#0f172a" stroke-width="6" stroke-linecap="round" opacity="0.3">
    <line x1="200" y1="350" x2="160" y2="440"/>
    <line x1="256" y1="365" x2="236" y2="445"/>
    <line x1="312" y1="350" x2="352" y2="440"/>
  </g>
</svg>
